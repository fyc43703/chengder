<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>一般性作業安全衛生稽查表</title>
    <style>
        /* 基本重置與全域設定 */
        *, *::before, *::after { box-sizing: border-box; }
        html { width: 100%; overflow-x: hidden; }
        body { 
            font-family: "微軟正黑體", "Microsoft JhengHei", sans-serif; 
            margin: 0; 
            padding: 30px 20px; 
            background-color: #eef2f5; 
            color: #333;
            width: 100%;
            min-width: 0;
            overflow-x: hidden;
        }
        .container { 
            max-width: 1100px; 
            margin: 0 auto; 
            background: #fff; 
            padding: 40px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            border-radius: 4px;
            width: 100%;
            min-width: 0;
        }

        /* 標題與表頭資訊 */
        .form-page { margin-bottom: 60px; }
        .form-code { font-size: 14px; margin-bottom: 10px; color: #555; }
        h1 { text-align: center; font-size: 26px; margin: 0 0 5px 0; letter-spacing: 1px; }
        h2 { text-align: center; font-size: 20px; margin: 0 0 20px 0; font-weight: normal; }
        
        .date-row { text-align: right; margin-bottom: 15px; font-size: 16px; font-weight: bold; }
        
        /* 下拉選單樣式 */
        select.date-year, select.date-month, select.date-day {
            font-family: inherit; font-size: 16px; padding: 2px 5px; text-align: center;
            border: none; border-bottom: 1px solid #333; outline: none; background: transparent; cursor: pointer;
        }
        select.proj-sel {
            width: 100%; padding: 6px; font-family: inherit; font-size: 15px; border: 1px solid #ccc;
            border-radius: 4px; outline: none; cursor: pointer; background-color: #fdfdfd; transition: 0.2s;
        }

        /* 表格共用設定 */
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; table-layout: auto; }
        th, td { border: 1px solid #222; padding: 10px; line-height: 1.5; outline: none; word-break: break-word; }
        th { background-color: #ffffcc; font-weight: bold; text-align: center; } 
        
        /* 基本資訊表格 */
        .info-table th { width: 18%; }
        .info-table td { width: 32%; }
        
        .org-main, .org-super, .org-pm, .org-contractor { color: #0056b3; font-weight: bold; }
        .fail-count-cell { color: #dc3545; font-weight: bold; text-align: center; font-size: 18px; }
        
        .sync-text { color: #0056b3; font-weight: bold; }
        [contenteditable="true"]:empty:before { content: "點此輸入..."; color: #aaa; font-weight: normal; font-size: 14px; }

        /* 稽查項目表格寬度分配 */
        .checklist-table th.col-cat { width: 6%; }
        .checklist-table th.col-desc { width: 44%; }
        .checklist-table th.col-pass { width: 10%; min-width: 80px; }
        .checklist-table th.col-fail { width: 10%; min-width: 80px; }
        .checklist-table th.col-remark { width: 30%; }

        /* 合格全選按鈕樣式 */
        .btn-select-all {
            display: block;
            font-size: 12px;
            color: #007bff;
            text-decoration: underline;
            cursor: pointer;
            margin-top: 5px;
            font-weight: normal;
        }
        .btn-select-all:hover { color: #0056b3; }

        /* 文字直排設定 */
        .vertical-text {
            text-align: center;
            vertical-align: middle;
            line-height: 1.2;
            letter-spacing: 3px;
            font-weight: bold;
        }

        /* 客製化單選按鈕 */
        .radio-cell { padding: 0 !important; text-align: center; vertical-align: middle; }
        .radio-cell label {
            display: flex; align-items: center; justify-content: center;
            width: 100%; height: 100%; min-height: 50px; cursor: pointer; margin: 0;
        }
        .radio-cell input[type="radio"] { display: none; }
        .custom-radio {
            width: 24px; height: 24px; border: 2px solid #aaa; border-radius: 50%; 
            display: inline-block; position: relative; background: #fff;
        }
        .pass-radio:checked + .custom-radio { border-color: #007bff; }
        .pass-radio:checked + .custom-radio::after {
            content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 14px; height: 14px; background-color: #007bff; border-radius: 50%;
        }
        .fail-radio:checked + .custom-radio { border-color: #dc3545; }
        .fail-radio:checked + .custom-radio::after {
            content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 14px; height: 14px; background-color: #dc3545; border-radius: 50%;
        }

        /* 電子簽章區 */
        .signatures { display: flex; justify-content: space-between; border-top: 2px solid #333; padding-top: 25px; gap: 20px; }
        .sign-column { width: 48%; display: flex; flex-direction: column; gap: 15px; }
        .sign-row { display: flex; align-items: center; justify-content: space-between; }
        .sign-label { font-size: 16px; font-weight: bold; width: 100px; }
        .sign-box {
            flex: 1; height: 50px; border: 2px dashed #999; border-radius: 6px; 
            background-color: #fafafa; display: flex; align-items: center; justify-content: center;
            color: #888; font-size: 15px; font-weight: bold; cursor: pointer;
        }

        /* 功能按鈕 */
        .bottom-actions { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-top: 40px; padding-top: 30px; border-top: 1px dashed #ccc; }
        .btn-3d { padding: 15px 30px; font-size: 18px; font-weight: bold; color: #fff; border: none; border-radius: 8px; cursor: pointer; }
        .btn-pdf { background-color: #007bff; }
        .btn-photo { background-color: #17a2b8; }
        .btn-draft { background-color: #fd7e14; }
        .btn-system { background-color: #28a745; }

        /* ----------------------------------------------------------- */
        /* 手機模式修正專區 (RWD) */
        /* ----------------------------------------------------------- */
        @media (max-width: 768px) {
            /* === 全頁滿版，移除所有邊距 === */
            html, body {
                width: 100%;
                margin: 0;
                padding: 0;
                background-color: #fff;
                overflow-x: hidden;
            }
            .container {
                width: 100%;
                max-width: 100%;
                margin: 0;
                padding: 12px 10px;
                box-shadow: none;
                border-radius: 0;
            }

            /* === 標題縮小 === */
            h1 { font-size: 19px; line-height: 1.4; }
            h2 { font-size: 15px; }
            .form-code { font-size: 12px; }

            /* === 日期列改為左對齊、換行顯示 === */
            .date-row {
                text-align: left;
                font-size: 13px;
                display: flex;
                flex-wrap: wrap;
                align-items: center;
                gap: 2px 4px;
                line-height: 2;
            }
            select.date-year, select.date-month, select.date-day {
                font-size: 13px;
                max-width: 70px;
            }

            /* === 基本資訊表格：讓 th/td 自適應 === */
            .info-table { table-layout: fixed; }
            .info-table th, .info-table td {
                font-size: 12px;
                padding: 6px 5px;
                word-break: break-all;
                white-space: normal;
            }
            .info-table th { width: 28%; }
            .info-table td { width: 22%; }
            select.proj-sel { font-size: 12px; padding: 4px; }

            /* === 稽查列表：橫向滾動容器 === */
            .table-responsive {
                width: 100%;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                border: 1px solid #ccc;
                /* 讓捲軸提示更明顯 */
                position: relative;
            }
            /* 固定稽查表最小寬度，使其可橫滑 */
            table.checklist-table {
                min-width: 700px;
                font-size: 13px;
            }
            table.checklist-table th,
            table.checklist-table td {
                padding: 7px 6px;
            }

            /* === 備註說明區塊 === */
            div[style*="background:#f9f9f9"] {
                font-size: 12px !important;
                padding: 10px !important;
            }

            /* === 電子簽章區 === */
            .signatures {
                flex-direction: column;
                gap: 12px;
            }
            .sign-column { width: 100%; gap: 10px; }
            .sign-label { font-size: 14px; width: 90px; }
            .sign-box { font-size: 14px; height: 44px; }

            /* === 底部功能按鈕 === */
            .bottom-actions {
                flex-direction: column;
                gap: 10px;
                margin-top: 20px;
                padding-top: 20px;
            }
            .btn-3d {
                width: 100%;
                padding: 13px;
                font-size: 15px;
            }

            /* === 防止 contenteditable 欄位溢出 === */
            [contenteditable="true"] {
                min-width: 0;
                word-break: break-all;
            }
        }

        /* 列印設定 */
        @media print {
            .bottom-actions, .btn-select-all { display: none !important; }
            body { padding: 0; background-color: #fff; }
            .container { box-shadow: none; padding: 0; width: 100%; }
            .form-page { page-break-after: always; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="app"></div>

    <div class="bottom-actions" id="action-buttons">
        <button class="btn-3d btn-pdf" onclick="exportHTML()">📄 預覽匯出</button>
        <button class="btn-3d btn-photo">📸 傳送照片</button>
        <button class="btn-3d btn-draft">💾 暫存</button>
        <button class="btn-3d btn-system">🚀 系統確認登錄</button>
    </div>
</div>

<script>
    const projectData = {
        "環狀線北環段CF680B": { main: "第一區工程處", super: "土木第一工務所", pm: "台灣世曦工程顧問", contractor: "皇昌營造" },
        "環狀線南環段CF670":  { main: "第二區工程處", super: "土木第十一工務所", pm: "台灣世曦工程顧問", contractor: "大陸工程" },
        "環狀線東環段CF763":  { main: "第二區工程處", super: "土木第三工務所", pm: "中興工程顧問", contractor: "日商華大林組/互助營造" }
    };

    window.updateProjectInfo = function(val) {
        const data = projectData[val] || { main: "", super: "", pm: "", contractor: "" };
        document.querySelectorAll('.proj-sel').forEach(el => el.value = val);
        document.querySelectorAll('.org-main').forEach(el => el.textContent = data.main);
        document.querySelectorAll('.org-super').forEach(el => el.textContent = data.super);
        document.querySelectorAll('.org-pm').forEach(el => el.textContent = data.pm);
        document.querySelectorAll('.org-contractor').forEach(el => el.textContent = data.contractor);
    };

    window.syncDate = function(type, val) {
        document.querySelectorAll('.date-' + type).forEach(el => el.value = val);
    };

    window.syncField = function(className, sourceElement) {
        const val = sourceElement.textContent;
        document.querySelectorAll('.' + className).forEach(el => { if (el !== sourceElement) el.textContent = val; });
    };

    // 【功能一】合格全選函式
    window.checkAllPass = function(fIndex) {
        const passRadios = document.querySelectorAll(`.pass-radio-f${fIndex}`);
        passRadios.forEach(radio => {
            radio.checked = true;
        });
        calcFailCount(fIndex); // 全選後自動更新不合格數量為 0
    };

    // 計算不合格數量
    window.calcFailCount = function(fIndex) {
        const failCount = document.querySelectorAll(`.fail-radio-f${fIndex}:checked`).length;
        document.getElementById(`fail_count_${fIndex}`).textContent = failCount;
    };

    window.exportHTML = function() {
        const htmlString = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
        const blob = new Blob([htmlString], { type: 'text/html;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `稽查表_${new Date().getTime()}.html`;
        a.click();
    };

    // 完整的表單資料
    const formsData = [
        {
            formCode: "FP23-EMA2-50-B-R00",
            title: "一般性作業安全衛生稽查表（一）",
            subtitle: "（勞工有立即發生危險之虞檢查事項）",
            categories: [
                {
                    name: "有立即發生墜落危險之虞",
                    items: [
                        { id: "010101", desc: "於高差 2 公尺以上之工作場所邊緣及開口部分，設置符合規定之護欄、護蓋、安全網或配掛安全帶之防墜設施。" },
                        { id: "010102", desc: "於高差 2 公尺以上之處所進行作業時，使用高空工作車，或以架設施工架等方法設置工作臺。" },
                        { id: "010103", desc: "於石綿板、鐵皮板、瓦、木板等易踏穿材料構築之屋頂，設置防止踏穿踏板。" },
                        { id: "010104", desc: "於高差超過 1.5 公尺以上之場所作業，設置符合規定之安全上下設備。" },
                        { id: "010105", desc: "高差超過二層樓或7.5 公尺以上之鋼構建築，張設安全網。" },
                        { id: "010106", desc: "使用移動式起重機吊掛平台作業，採取防止墜落設施。" }
                    ]
                },
                {
                    name: "有立即發生感電危險之虞",
                    items: [
                        { id: "010201", desc: "對電氣機具之帶電部分，設防止感電之護圍或絕緣被覆。" },
                        { id: "010202", desc: "使用移動式電動機具或臨時用電設備，設置漏電斷路器。" }
                    ]
                }
            ],
            notes: "說明：1.本表供機關及監造單位定期稽查使用。2.重複缺失每次扣罰 25,000 元。"
        },
        {
            formCode: "FP23-EMA2-50-B-R00",
            title: "一般性作業安全衛生稽查表（二）",
            subtitle: "（施工安全衛生須知第 5 點檢查事項）",
            categories: [
                {
                    name: "施工安全規範",
                    items: [
                        { id: "020101", desc: "邊緣及開口部分或高處作業有墜落危險之虞者，應設置護欄、護蓋或安全網。" },
                        { id: "020102", desc: "垂直高度 20 公尺以下高處作業，不得使用搭乘設備搭載吊升人員。" }
                    ]
                }
            ],
            notes: "說明：未立即停工或未於規定期限改善完成者，每次扣罰新臺幣 25,000 元。"
        },
        {
            formCode: "FP23-EMA2-50-B-R00",
            title: "一般性作業安全衛生稽查表（三）",
            subtitle: "",
            categories: [
                {
                    name: "安全管理",
                    items: [
                        { id: "030101", desc: "職業安全衛生人員常駐工地。" },
                        { id: "030111", desc: "設置休息區，配置飲水及食鹽。" }
                    ]
                }
            ],
            notes: "說明：人員未配戴安全帽等，每人次扣罰新臺幣 3,000 元。"
        }
    ];

    let yearOpts = '<option value="">請選擇</option>'; for(let i=113; i<=115; i++) yearOpts += `<option value="${i}">${i}</option>`;
    let monthOpts = '<option value="">請選擇</option>'; for(let i=1; i<=12; i++) monthOpts += `<option value="${i}">${i}</option>`;
    let dayOpts = '<option value="">請選擇</option>'; for(let i=1; i<=31; i++) dayOpts += `<option value="${i}">${i}</option>`;

    let htmlContent = '';
    formsData.forEach((form, fIndex) => {
        htmlContent += `
        <div class="form-page">
            <div class="form-code">表單編碼：${form.formCode}</div>
            <h1>${form.title}</h1>
            ${form.subtitle ? `<h2>${form.subtitle}</h2>` : '<div style="height:20px;"></div>'}
            
            <div class="date-row">
                檢查日期： 
                <select class="date-year" onchange="syncDate('year', this.value)">${yearOpts}</select> 年 
                <select class="date-month" onchange="syncDate('month', this.value)">${monthOpts}</select> 月 
                <select class="date-day" onchange="syncDate('day', this.value)">${dayOpts}</select> 日
            </div>

            <table class="info-table">
                <tr>
                    <th>工程名稱</th>
                    <td>
                        <select class="proj-sel" onchange="updateProjectInfo(this.value)">
                            <option value="">-- 請選擇 --</option>
                            <option value="環狀線北環段CF680B">環狀線北環段CF680B</option>
                            <option value="環狀線南環段CF670">環狀線南環段CF670</option>
                            <option value="環狀線東環段CF763">環狀線東環段CF763</option>
                        </select>
                    </td>
                    <th>不合格數量</th>
                    <td id="fail_count_${fIndex}" class="fail-count-cell">0</td>
                </tr>
                <tr>
                    <th>主辦機關</th><td class="org-main"></td>
                    <th>專案管理廠商</th><td class="org-pm"></td>
                </tr>
                <tr>
                    <th>監造單位</th><td class="org-super"></td>
                    <th>承攬廠商</th><td class="org-contractor"></td>
                </tr>
                <tr>
                    <th>檢查地點</th><td contenteditable="true" class="sync-loc sync-text" oninput="syncField('sync-loc', this)"></td>
                    <th>檢查位置</th><td contenteditable="true" class="sync-pos sync-text" oninput="syncField('sync-pos', this)"></td>
                </tr>
            </table>

            <div style="text-align:right; font-size:12px; color:#d32f2f; margin-bottom:5px;">向右滑動查看更多 ➔</div>
            <div class="table-responsive">
                <table class="checklist-table">
                    <thead>
                        <tr>
                            <th colspan="2">檢查項目</th>
                            <th class="col-pass">合格<span class="btn-select-all" onclick="checkAllPass(${fIndex})">(全選)</span></th>
                            <th class="col-fail">不合格</th>
                            <th class="col-remark">缺失情形／改善期限</th>
                        </tr>
                    </thead>
                    <tbody>
        `;

        form.categories.forEach(cat => {
            const verticalName = cat.name.split('').join('<br>');
            cat.items.forEach((item, iIndex) => {
                const uniqueName = `radio_${fIndex}_${item.id}`;
                htmlContent += `
                <tr>
                    ${iIndex === 0 ? `<td rowspan="${cat.items.length}" class="col-cat vertical-text">${verticalName}</td>` : ''}
                    <td class="col-desc"><strong>${item.id}</strong> ${item.desc}</td>
                    <td class="radio-cell">
                        <label>
                            <input type="radio" class="pass-radio pass-radio-f${fIndex}" name="${uniqueName}" onchange="calcFailCount(${fIndex})">
                            <span class="custom-radio"></span>
                        </label>
                    </td>
                    <td class="radio-cell">
                        <label>
                            <input type="radio" class="fail-radio fail-radio-f${fIndex}" name="${uniqueName}" onchange="calcFailCount(${fIndex})">
                            <span class="custom-radio"></span>
                        </label>
                    </td>
                    <td contenteditable="true"></td>
                </tr>`;
            });
        });

        htmlContent += `
                    </tbody>
                </table>
            </div>

            <div style="background:#f9f9f9; padding:15px; border:1px solid #ddd; font-size:14px; margin-bottom:20px;">${form.notes}</div>

            <div class="signatures">
                <div class="sign-column">
                    <div class="sign-row"><span class="sign-label">會同單位：</span><div class="sign-box">電子簽章</div></div>
                    <div class="sign-row"><span class="sign-label">會同人員：</span><div class="sign-box">電子簽章</div></div>
                </div>
                <div class="sign-column">
                    <div class="sign-row"><span class="sign-label">稽查單位：</span><div class="sign-box">電子簽章</div></div>
                    <div class="sign-row"><span class="sign-label">稽查人員：</span><div class="sign-box">電子簽章</div></div>
                </div>
            </div>
        </div>
        `;
    });

    document.getElementById('app').innerHTML = htmlContent;
</script>

</body>
</html>
