<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>一般性作業安全衛生稽查表</title>
    <style>
        /* ========================================================= */
        /* 原有基本樣式與排版設定 */
        /* ========================================================= */
        *, *::before, *::after { box-sizing: border-box; }
        html { width: 100%; overflow-x: hidden; }
        body { 
            font-family: "微軟正黑體", "Microsoft JhengHei", sans-serif; 
            margin: 0; 
            padding: 30px 20px; 
            background-color: #eef2f5; 
            color: #333;
            width: 100%;
            min-width: 0;
            overflow-x: hidden;
        }
        .container { 
            max-width: 1100px; 
            margin: 0 auto; 
            background: #fff; 
            padding: 40px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            border-radius: 4px;
            width: 100%;
            min-width: 0;
        }

        .form-page { margin-bottom: 60px; }
        .form-header-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .form-code { font-size: 14px; color: #555; }
        .ref-links { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
        .ref-links a { color: #1a6bb5; font-size: 14px; font-weight: bold; text-decoration: none; line-height: 1.6; }
        .ref-links a:hover { text-decoration: underline; }
        h1 { text-align: center; font-size: 26px; margin: 0 0 5px 0; letter-spacing: 1px; }
        h2 { text-align: center; font-size: 20px; margin: 0 0 20px 0; font-weight: normal; }
        .date-row { text-align: right; margin-bottom: 15px; font-size: 16px; font-weight: bold; }
        
        select.date-year, select.date-month, select.date-day {
            font-family: inherit; font-size: 16px; padding: 2px 5px; text-align: center;
            border: none; border-bottom: 1px solid #333; outline: none; background: transparent; cursor: pointer;
        }
        select.proj-sel {
            width: 100%; padding: 6px; font-family: inherit; font-size: 15px; border: 1px solid #ccc;
            border-radius: 4px; outline: none; cursor: pointer; background-color: #fdfdfd; transition: 0.2s;
        }

        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; table-layout: auto; }
        th, td { border: 1px solid #222; padding: 10px; line-height: 1.5; outline: none; word-break: break-word; }
        th { background-color: #ffffcc; font-weight: bold; text-align: center; } 
        
        .info-table th { width: 18%; }
        .info-table td { width: 32%; }
        .org-main, .org-super, .org-pm, .org-contractor { color: #0056b3; font-weight: bold; }
        .fail-count-cell { color: #dc3545; font-weight: bold; text-align: center; font-size: 18px; }
        .sync-text { color: #0056b3; font-weight: bold; }
        [contenteditable="true"]:empty:before { content: "點此輸入..."; color: #aaa; font-weight: normal; font-size: 14px; }

        .checklist-table th.col-cat { width: 6%; }
        .checklist-table th.col-desc { width: 44%; }
        .checklist-table th.col-pass { width: 10%; min-width: 80px; }
        .checklist-table th.col-fail { width: 10%; min-width: 80px; }
        .checklist-table th.col-remark { width: 30%; }

        /* ========================================================= */
        /* (全選) 與 (取消) 的排版樣式 */
        /* ========================================================= */
        .header-actions { display: flex; justify-content: center; gap: 10px; margin-top: 5px; }
        .btn-select-all, .btn-cancel-all { font-size: 13px; text-decoration: underline; cursor: pointer; font-weight: normal; }
        .btn-select-all { color: #007bff; }
        .btn-select-all:hover { color: #0056b3; }
        .btn-cancel-all { color: #6c757d; }
        .btn-cancel-all:hover { color: #343a40; }

        .vertical-text { text-align: center; vertical-align: middle; line-height: 1.2; letter-spacing: 3px; font-weight: bold; }

        .radio-cell { padding: 0 !important; text-align: center; vertical-align: middle; }
        /* 加入過渡動畫讓鎖定狀態更滑順 */
        .radio-cell label { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; min-height: 50px; cursor: pointer; margin: 0; transition: opacity 0.2s; }
        .radio-cell input[type="radio"] { display: none; }
        .custom-radio { width: 24px; height: 24px; border: 2px solid #aaa; border-radius: 50%; display: inline-block; position: relative; background: #fff; }
        
        .pass-radio:checked + .custom-radio { border-color: #007bff; }
        .pass-radio:checked + .custom-radio::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 14px; height: 14px; background-color: #007bff; border-radius: 50%; }
        
        .fail-radio:checked + .custom-radio { border-color: #dc3545; }
        .fail-radio:checked + .custom-radio::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 14px; height: 14px; background-color: #dc3545; border-radius: 50%; }

        .signatures { display: flex; justify-content: space-between; border-top: 2px solid #333; padding-top: 25px; gap: 20px; }
        .sign-column { width: 48%; display: flex; flex-direction: column; gap: 15px; }
        .sign-row { display: flex; align-items: center; justify-content: space-between; }
        .sign-label { font-size: 16px; font-weight: bold; width: 100px; }
        .sign-box { flex: 1; height: 60px; border: 2px dashed #999; border-radius: 6px; background-color: #fafafa; display: flex; align-items: center; justify-content: center; color: #888; font-size: 15px; font-weight: bold; cursor: pointer; overflow: hidden; }
        .sign-box img { max-height: 100%; max-width: 100%; object-fit: contain; }

        .bottom-actions { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-top: 40px; padding-top: 30px; border-top: 1px dashed #ccc; }
        .btn-3d { padding: 15px 30px; font-size: 18px; font-weight: bold; color: #fff; border: none; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-pdf { background-color: #007bff; }
        .btn-photo { background-color: #17a2b8; }
        .btn-draft { background-color: #fd7e14; }
        .btn-system { background-color: #28a745; }

        /* ========================================================= */
        /* 圖示常時動態旋轉樣式設定 */
        /* ========================================================= */
        @keyframes spin-anim { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .spin-icon { display: inline-block; animation: spin-anim 2s linear infinite; margin-right: 8px; font-size: 20px; }

        /* ========================================================= */
        /* 不合格照片上傳區塊樣式 */
        /* ========================================================= */
        #photo-report-section { display: none; margin-top: 40px; padding-top: 20px; border-top: 3px double #333; }
        #photo-report-section h2 { text-align: center; font-size: 22px; font-weight: bold; color: #dc3545; margin-bottom: 20px; }
        table.photo-table th { background-color: #f8f9fa; }
        table.photo-table th:nth-child(1) { width: 15%; }
        table.photo-table th:nth-child(2) { width: 45%; }
        table.photo-table th:nth-child(3) { width: 40%; }
        table.photo-table td { text-align: center; vertical-align: middle; }
        .upload-btn-ui { display: inline-block; background-color: #000080; color: #fff; padding: 8px 16px; font-size: 16px; font-weight: bold; cursor: pointer; letter-spacing: 2px; }
        .upload-btn-ui:active { transform: scale(0.95); }
        .uploaded-img-preview { max-width: 100%; max-height: 200px; object-fit: contain; display: block; margin: 0 auto; }
        .reupload-text { display: inline-block; margin-top: 8px; font-size: 13px; color: #0056b3; text-decoration: underline; cursor: pointer; }

        /* ========================================================= */
        /* 系統確認登錄 - 彈跳視窗樣式 */
        /* ========================================================= */
        #system-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.65); z-index: 10000; align-items: center; justify-content: center; }
        .sys-container { background: #fff; width: 90%; max-width: 480px; border-radius: 12px; padding: 30px 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); text-align: center; font-family: "微軟正黑體", sans-serif; max-height: 90vh; overflow-y: auto; }
        .sys-title { color: #0056b3; font-size: 22px; font-weight: bold; margin-bottom: 20px; margin-top: 0; }
        .sys-details { background: #f4f7fa; border: 1px solid #dce4ec; border-radius: 8px; padding: 15px; text-align: left; font-size: 16px; line-height: 1.8; color: #333; margin-bottom: 15px; }
        .sys-details strong { color: #555; display: inline-block; width: 90px; }
        
        /* 新增：提醒文字樣式 */
        .sys-reminder { color: #0056b3; font-size: 15px; font-weight: bold; text-align: left; line-height: 1.5; margin-bottom: 20px; padding: 0 5px; }
        
        .sys-warning { color: #d9534f; font-size: 16px; font-weight: bold; margin-bottom: 30px; text-align: center; line-height: 1.6; }
        .sys-actions { display: flex; justify-content: space-around; align-items: center; }
        .sys-btn-group { display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: transform 0.1s; }
        .sys-btn-group:active { transform: scale(0.9); }
        .sys-icon { width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 35px; font-weight: bold; margin-bottom: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .sys-icon.red { background-color: #dc3545; }
        .sys-icon.green { background-color: #28a745; }
        .sys-label { font-size: 18px; font-weight: bold; color: #333; letter-spacing: 2px; }

        /* ========================================================= */
        /* 電子簽章專用 Modal 樣式 */
        /* ========================================================= */
        #sig-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); z-index: 9999; align-items: center; justify-content: center; }
        .sig-container { width: 90%; max-width: 800px; height: 80vh; max-height: 500px; background: #111; border-radius: 10px; padding: 10px; display: flex; flex-direction: column; box-shadow: 0 5px 25px rgba(0,0,0,0.5); }
        .sig-header { display: flex; justify-content: space-between; align-items: center; color: #fff; padding: 5px 15px 15px 15px; font-size: 18px; font-weight: bold; }
        .sig-header-btn { color: #ccc; font-size: 16px; cursor: pointer; }
        .sig-body { display: flex; flex: 1; gap: 10px; background: #fff; border-radius: 5px; padding: 10px; }
        .sig-canvas-wrapper { flex: 1; border: 1px solid #ccc; background: #fff; touch-action: none; }
        canvas#sig-canvas { width: 100%; height: 100%; cursor: crosshair; display: block; }
        .sig-controls { width: 80px; display: flex; flex-direction: column; justify-content: space-between; gap: 10px; }
        .sig-btn { flex: 1; border: none; border-radius: 5px; color: #333; font-weight: bold; font-size: 14px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #f0f0f0; border: 1px solid #ddd; transition: 0.2s; }
        .sig-btn:active { transform: scale(0.95); }
        .sig-btn .icon { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 20px; margin-bottom: 5px; font-weight: bold; }
        .sig-btn-confirm .icon { background-color: #28a745; }
        .sig-btn-clear .icon { background-color: #dc3545; }

        /* ========================================================= */
        /* 手機模式修正專區 (RWD) */
        /* ========================================================= */
        @media (max-width: 768px) {
            html, body { width: 100%; margin: 0; padding: 0; background-color: #fff; overflow-x: hidden; }
            .container { width: 100%; max-width: 100%; margin: 0; padding: 12px 10px; box-shadow: none; border-radius: 0; }
            h1 { font-size: 19px; line-height: 1.4; }
            h2 { font-size: 15px; }
            .date-row { text-align: left; font-size: 13px; display: flex; flex-wrap: wrap; align-items: center; gap: 2px 4px; line-height: 2; }
            select.date-year, select.date-month, select.date-day { font-size: 13px; max-width: 70px; }
            .info-table { table-layout: fixed; }
            .info-table th, .info-table td { font-size: 12px; padding: 6px 5px; word-break: break-all; white-space: normal; }
            .info-table th { width: 28%; }
            .info-table td { width: 22%; }
            select.proj-sel { font-size: 12px; padding: 4px; }
            .table-responsive { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; border: 1px solid #ccc; position: relative; }
            table.checklist-table { min-width: 700px; font-size: 13px; }
            table.checklist-table th, table.checklist-table td { padding: 7px 6px; }
            .bottom-actions { flex-direction: column; gap: 10px; margin-top: 20px; padding-top: 20px; }
            .btn-3d { width: 100%; padding: 13px; font-size: 15px; }
        }

        @media print {
            .bottom-actions, .header-actions { display: none !important; }
            body { padding: 0; background-color: #fff; }
            .container { box-shadow: none; padding: 0; width: 100%; }
            .form-page { page-break-after: always; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="app"></div>

    <div id="photo-report-section">
        <h2>📷 稽查缺失照片紀錄</h2>
        <table class="photo-table" id="photo-table">
            <thead><tr><th>檢查項目</th><th>不合格缺失說明</th><th>照片</th></tr></thead>
            <tbody id="photo-table-body"></tbody>
        </table>
    </div>

    <!-- 底部功能按鈕 -->
    <div class="bottom-actions" id="action-buttons">
        <button class="btn-3d btn-photo" onclick="generatePhotoReport()"><span class="spin-icon">📸</span> 傳送照片</button>
        <button class="btn-3d btn-draft" onclick="exportXML()"><span class="spin-icon">💾</span> 暫存</button>
        <button class="btn-3d btn-pdf" onclick="exportHTML()"><span class="spin-icon">📄</span> 預覽匯出</button>
        <button class="btn-3d btn-system" onclick="openSystemModal()"><span class="spin-icon">🚀</span> 系統確認登錄</button>
    </div>
</div>

<!-- 系統確認 Modal -->
<div id="system-modal">
    <div class="sys-container">
        <h2 class="sys-title">系統登錄確認</h2>
        <div class="sys-details">
            <div><strong>日　　期：</strong> <span id="sys-datetime"></span></div>
            <div><strong>工程名稱：</strong> <span id="sys-proj"></span></div>
            <div><strong>監造單位：</strong> <span id="sys-super"></span></div>
            <div><strong>承攬廠商：</strong> <span id="sys-contractor"></span></div>
            <div><strong>檢查地點：</strong> <span id="sys-loc"></span></div>
            <div><strong>檢查位置：</strong> <span id="sys-pos"></span></div>
        </div>
        
        <!-- 新增的提醒文字 -->
        <div class="sys-reminder">
            提醒：請先開啟 GlobalProtect App，確認 VPN 已成功連線至本局後，再進行稽查紀錄上傳作業。
        </div>

        <div class="sys-warning">確認後傳送<br>臺北市政府捷運工程局<br>安全衛生稽查管理系統</div>
        <div class="sys-actions">
            <div class="sys-btn-group" onclick="closeSystemModal()"><div class="sys-icon red">✖</div><div class="sys-label">清除</div></div>
            <div class="sys-btn-group" onclick="submitSystemData()"><div class="sys-icon green">✔</div><div class="sys-label">確認</div></div>
        </div>
    </div>
</div>

<!-- 簽章 Modal -->
<div id="sig-modal">
    <div class="sig-container">
        <div class="sig-header"><span class="sig-header-btn" onclick="closeSignaturePad()">❮ 返回</span>請簽名<span style="width: 50px;"></span></div>
        <div class="sig-body">
            <div class="sig-canvas-wrapper" id="canvas-wrapper"><canvas id="sig-canvas"></canvas></div>
            <div class="sig-controls">
                <button class="sig-btn sig-btn-confirm" onclick="saveSignature()"><div class="icon">✔</div>確認</button>
                <button class="sig-btn sig-btn-clear" onclick="clearCanvas()"><div class="icon">✖</div>清除</button>
            </div>
        </div>
    </div>
</div>

<script>
    // 匯出暫存 XML
    window.exportXML = function() {
        const year = document.querySelector('.date-year').value;
        const month = document.querySelector('.date-month').value;
        const day = document.querySelector('.date-day').value;
        const proj = document.querySelector('.proj-sel').value || "未選擇";
        const loc = document.querySelector('.sync-loc').textContent.trim() || "未填寫";
        const pos = document.querySelector('.sync-pos').textContent.trim() || "未填寫";
        const orgMain = document.querySelector('.org-main').textContent.trim() || "未填寫";
        const orgPm = document.querySelector('.org-pm').textContent.trim() || "未填寫";
        const orgSuper = document.querySelector('.org-super').textContent.trim() || "未填寫";
        const orgContractor = document.querySelector('.org-contractor').textContent.trim() || "未填寫";

        let totalFailCount = 0;
        document.querySelectorAll('.fail-count-cell').forEach(cell => { totalFailCount += parseInt(cell.textContent) || 0; });

        const failItems = [];
        document.querySelectorAll('.fail-radio:checked').forEach(radio => {
            const tr = radio.closest('tr');
            const itemDesc = tr.querySelector('.col-desc').textContent.trim();
            const defectText = tr.querySelector('.defect-desc-input').textContent.trim() || "未填寫說明";
            failItems.push({ item: itemDesc, defect: defectText });
        });

        const escapeXML = (str) => str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');

        let xmlString = `<?xml version="1.0" encoding="utf-8"?>\n<稽查紀錄>\n`;
        xmlString += `  <檢查日期>${year}年${month}月${day}日</檢查日期>\n  <年>${year}</年>\n  <月>${month}</月>\n  <日>${day}</日>\n`;
        xmlString += `  <工程名稱>${escapeXML(proj)}</工程名稱>\n  <不合格數量>${totalFailCount}</不合格數量>\n`;
        xmlString += `  <主辦機關>${escapeXML(orgMain)}</主辦機關>\n  <專案管理廠商>${escapeXML(orgPm)}</專案管理廠商>\n`;
        xmlString += `  <監造單位>${escapeXML(orgSuper)}</監造單位>\n  <承攬廠商>${escapeXML(orgContractor)}</承攬廠商>\n`;
        xmlString += `  <檢查地點>${escapeXML(loc)}</檢查地點>\n  <檢查位置>${escapeXML(pos)}</檢查位置>\n`;
        
        if (failItems.length > 0) {
            failItems.forEach(fi => {
                xmlString += `  <檢查項目>${escapeXML(fi.item)}</檢查項目>\n  <缺失情形／改善期限>${escapeXML(fi.defect)}</缺失情形／改善期限>\n`;
            });
        } else {
            xmlString += `  <檢查項目></檢查項目>\n  <缺失情形／改善期限></缺失情形／改善期限>\n`;
        }
        xmlString += `</稽查紀錄>`;

        const blob = new Blob([xmlString], { type: 'text/xml' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a'); link.href = url;
        link.download = `稽查暫存檔_${year}${month.padStart(2,'0')}${day.padStart(2,'0')}.xml`;
        document.body.appendChild(link); link.click(); document.body.removeChild(link); URL.revokeObjectURL(url);
    };

    // 系統登錄功能
    window.openSystemModal = function() {
        const now = new Date();
        const rocYear = now.getFullYear() - 1911;
        const formattedDate = rocYear + '-' + (now.getMonth() + 1) + '-' + now.getDate() + ' ' + String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0') + ':' + String(now.getSeconds()).padStart(2, '0');
        document.getElementById('sys-datetime').textContent = formattedDate;
        document.getElementById('sys-proj').textContent = document.querySelector('.proj-sel').value || "(未選擇)";
        document.getElementById('sys-super').textContent = document.querySelector('.org-super').textContent.trim() || "(未填寫)";
        document.getElementById('sys-contractor').textContent = document.querySelector('.org-contractor').textContent.trim() || "(未填寫)";
        document.getElementById('sys-loc').textContent = document.querySelector('.sync-loc').textContent.trim() || "(未填寫)";
        document.getElementById('sys-pos').textContent = document.querySelector('.sync-pos').textContent.trim() || "(未填寫)";
        document.getElementById('system-modal').style.display = 'flex';
    };
    window.closeSystemModal = function() { document.getElementById('system-modal').style.display = 'none'; };
    window.submitSystemData = function() { alert("已將稽查紀錄傳送臺北市政府捷運工程局 安全衛生稽查管理系統"); closeSystemModal(); };
    window.addEventListener('click', function(event) { if (event.target == document.getElementById('system-modal')) closeSystemModal(); });

    // 表單資料同步功能
    const projectData = {
        "環狀線北環段CF680B": { main: "第一區工程處", super: "土木第一工務所", pm: "台灣世曦工程顧問", contractor: "皇昌營造" },
        "環狀線南環段CF670":  { main: "第二區工程處", super: "土木第十一工務所", pm: "台灣世曦工程顧問", contractor: "大陸工程" },
        "環狀線東環段CF763":  { main: "第二區工程處", super: "土木第三工務所", pm: "中興工程顧問", contractor: "日商華大林組/互助營造" }
    };
    window.updateProjectInfo = function(val) {
        const data = projectData[val] || { main: "", super: "", pm: "", contractor: "" };
        document.querySelectorAll('.proj-sel').forEach(el => el.value = val);
        document.querySelectorAll('.org-main').forEach(el => el.textContent = data.main);
        document.querySelectorAll('.org-super').forEach(el => el.textContent = data.super);
        document.querySelectorAll('.org-pm').forEach(el => el.textContent = data.pm);
        document.querySelectorAll('.org-contractor').forEach(el => el.textContent = data.contractor);
    };
    window.syncDate = function(type, val) { document.querySelectorAll('.date-' + type).forEach(el => el.value = val); };
    window.syncField = function(className, sourceElement) { const val = sourceElement.textContent; document.querySelectorAll('.' + className).forEach(el => { if (el !== sourceElement) el.textContent = val; }); };

    // =========================================================
    // 缺失情形輸入防呆鎖定機制
    // =========================================================
    window.handleDefectInput = function(cell, fIndex) {
        const text = cell.textContent.trim();
        const tr = cell.closest('tr');
        const failRadio = tr.querySelector('.fail-radio');
        const passRadio = tr.querySelector('.pass-radio');
        const passLabel = passRadio.closest('label'); // 取得點擊區域的標籤
        
        if (text !== '') {
            // 如果有文字，強制勾選不合格
            failRadio.checked = true;
            // 鎖定「合格」使其無法點擊
            passRadio.disabled = true;
            passLabel.style.pointerEvents = 'none';
            passLabel.style.opacity = '0.3'; // 變淡表示不可用
        } else {
            // 如果文字清空了，解除鎖定
            passRadio.disabled = false;
            passLabel.style.pointerEvents = 'auto';
            passLabel.style.opacity = '1';
        }
        
        // 重新計算不合格數量
        calcFailCount(fIndex);
    };

    // =========================================================
    // 全選與取消全選功能 (配合防呆機制)
    // =========================================================
    window.checkAllPass = function(fIndex) {
        document.querySelectorAll(`.pass-radio-f${fIndex}`).forEach(radio => { 
            // 只有未被鎖定的「合格」按鈕才會被全選勾選
            if (!radio.disabled) {
                radio.checked = true; 
            }
        });
        calcFailCount(fIndex); 
    };
    
    window.uncheckAllPass = function(fIndex) {
        // 清除該表格所有的勾選狀態 (合格與不合格皆清除)
        document.querySelectorAll(`.pass-radio-f${fIndex}, .fail-radio-f${fIndex}`).forEach(radio => { radio.checked = false; });
        calcFailCount(fIndex); 
    };
    
    window.calcFailCount = function(fIndex) {
        const failCount = document.querySelectorAll(`.fail-radio-f${fIndex}:checked`).length;
        document.getElementById(`fail_count_${fIndex}`).textContent = failCount;
    };

    // 匯出截圖
    window.exportHTML = async function() {
        const btn = document.querySelector('.btn-pdf');
        const actions = document.getElementById('action-buttons');
        if (!window.html2canvas) {
            await new Promise((resolve, reject) => {
                const s = document.createElement('script'); s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
                s.onload = resolve; s.onerror = () => reject(new Error('html2canvas 載入失敗')); document.head.appendChild(s);
            });
        }
        const origHTML = btn.innerHTML; btn.innerHTML = '<span class="spin-icon">⏳</span> 截圖中…'; btn.disabled = true; actions.style.display = 'none'; 
        try {
            const target = document.querySelector('.container');
            const canvas = await html2canvas(target, {
                scale: 2, useCORS: true, backgroundColor: '#ffffff', scrollX: 0, scrollY: 0, windowWidth: target.scrollWidth, width: target.scrollWidth, height: target.scrollHeight,
                onclone: (doc) => { doc.querySelectorAll('.table-responsive').forEach(el => { el.style.overflow = 'visible'; el.style.maxHeight = 'none'; }); const c = doc.querySelector('.container'); if (c) c.style.boxShadow = 'none'; }
            });
            const filename = `稽查表_${new Date().toLocaleDateString('zh-TW').replace(/\//g,'-')}.png`;
            const link = document.createElement('a'); link.download = filename; link.href = canvas.toDataURL('image/png'); link.click();
        } catch(err) { alert('匯出失敗：' + err.message); } finally { actions.style.display = ''; btn.innerHTML = origHTML; btn.disabled = false; }
    };

    const formsData = [
        {
            formCode: "FP23-EMA2-50-B-R00", title: "一般性作業安全衛生稽查表（一）", subtitle: "（勞工有立即發生危險之虞檢查事項）",
            categories: [
                { name: "有立即發生墜落危險之虞", items: [ { id: "010101", desc: "於高差 2 公尺以上之工作場所邊緣及開口部分，設置符合規定之護欄、護蓋、安全網或配掛安全帶之防墜設施。" }, { id: "010102", desc: "於高差 2 公尺以上之處所進行作業時，使用高空工作車，或以架設施工架等方法設置工作臺。" }, { id: "010103", desc: "於石綿板、鐵皮板、瓦、木板等易踏穿材料構築之屋頂，設置防止踏穿踏板。" }, { id: "010104", desc: "於高差超過 1.5 公尺以上之場所作業，設置符合規定之安全上下設備。" }, { id: "010105", desc: "高差超過二層樓或7.5 公尺以上之鋼構建築，張設安全網。" }, { id: "010106", desc: "使用移動式起重機吊掛平台作業，採取防止墜落設施。" } ] },
                { name: "有立即發生感電危險之虞", items: [ { id: "010201", desc: "對電氣機具之帶電部分，設防止感電之護圍或絕緣被覆。" }, { id: "010202", desc: "使用移動式電動機具或臨時用電設備，設置漏電斷路器。" } ] }
            ], notes: "說明：1.本表供機關及監造單位定期稽查使用。2.重複缺失每次扣罰 25,000 元。"
        },
        {
            formCode: "FP23-EMA2-50-B-R00", title: "一般性作業安全衛生稽查表（二）", subtitle: "（施工安全衛生須知第 5 點檢查事項）",
            categories: [ { name: "施工安全規範", items: [ { id: "020101", desc: "邊緣及開口部分或高處作業有墜落危險之虞者，應設置護欄、護蓋或安全網。" }, { id: "020102", desc: "垂直高度 20 公尺以下高處作業，不得使用搭乘設備搭載吊升人員。" } ] } ], notes: "說明：未立即停工或未於規定期限改善完成者，每次扣罰新臺幣 25,000 元。"
        },
        {
            formCode: "FP23-EMA2-50-B-R00", title: "一般性作業安全衛生稽查表（三）", subtitle: "",
            categories: [ { name: "安全管理", items: [ { id: "030101", desc: "職業安全衛生人員常駐工地。" }, { id: "030111", desc: "設置休息區，配置飲水及食鹽。" } ] } ], notes: "說明：人員未配戴安全帽等，每人次扣罰新臺幣 3,000 元。"
        }
    ];

    const _today = new Date(); const _rocYear  = _today.getFullYear() - 1911; const _month = _today.getMonth() + 1; const _day = _today.getDate();
    let yearOpts = ''; for (let i = 110; i <= _rocYear + 2; i++) yearOpts += `<option value="${i}" ${i === _rocYear ? 'selected' : ''}>${i}</option>`;
    let monthOpts = ''; for (let i = 1; i <= 12; i++) monthOpts += `<option value="${i}" ${i === _month ? 'selected' : ''}>${i}</option>`;
    let dayOpts = ''; for (let i = 1; i <= 31; i++) dayOpts += `<option value="${i}" ${i === _day ? 'selected' : ''}>${i}</option>`;

    let htmlContent = '';
    formsData.forEach((form, fIndex) => {
        htmlContent += `
        <div class="form-page">
            <div class="form-header-row"><div class="form-code">表單編碼：${form.formCode}</div><div class="ref-links"><a href="https://drive.google.com/file/d/1dGzu9SOqdDxkiOe4sXqsFG6_xkXnUXXA/view?usp=sharing" target="_blank">EMA2-50</a><a href="https://drive.google.com/file/d/1uEk-QVp15cUpIv8VxotOenJCOGBfooPI/view?usp=sharing" target="_blank">職業安全衛生設施規則</a><a href="https://drive.google.com/file/d/1wNidop-CSg9P7nix1tw35LKqLiz5EeRV/view?usp=sharing" target="_blank">營造安全衛生設施標準</a></div></div>
            <h1>${form.title}</h1>${form.subtitle ? `<h2>${form.subtitle}</h2>` : '<div style="height:20px;"></div>'}
            <div class="date-row">檢查日期： <select class="date-year" onchange="syncDate('year', this.value)">${yearOpts}</select> 年 <select class="date-month" onchange="syncDate('month', this.value)">${monthOpts}</select> 月 <select class="date-day" onchange="syncDate('day', this.value)">${dayOpts}</select> 日</div>
            <table class="info-table">
                <tr><th>工程名稱</th><td><select class="proj-sel" onchange="updateProjectInfo(this.value)"><option value="">-- 請選擇 --</option><option value="環狀線北環段CF680B">環狀線北環段CF680B</option><option value="環狀線南環段CF670">環狀線南環段CF670</option><option value="環狀線東環段CF763">環狀線東環段CF763</option></select></td><th>不合格數量</th><td id="fail_count_${fIndex}" class="fail-count-cell">0</td></tr>
                <tr><th>主辦機關</th><td class="org-main"></td><th>專案管理廠商</th><td class="org-pm"></td></tr>
                <tr><th>監造單位</th><td class="org-super"></td><th>承攬廠商</th><td class="org-contractor"></td></tr>
                <tr><th>檢查地點</th><td contenteditable="true" class="sync-loc sync-text" oninput="syncField('sync-loc', this)"></td><th>檢查位置</th><td contenteditable="true" class="sync-pos sync-text" oninput="syncField('sync-pos', this)"></td></tr>
            </table>
            <div style="text-align:right; font-size:12px; color:#d32f2f; margin-bottom:5px;">向右滑動查看更多 ➔</div>
            <div class="table-responsive">
                <table class="checklist-table">
                    <thead><tr><th colspan="2">檢查項目</th><th class="col-pass">合格<div class="header-actions"><span class="btn-select-all" onclick="checkAllPass(${fIndex})">(全選)</span><span class="btn-cancel-all" onclick="uncheckAllPass(${fIndex})">(取消)</span></div></th><th class="col-fail">不合格</th><th class="col-remark">缺失情形／改善期限</th></tr></thead>
                    <tbody>
        `;
        form.categories.forEach(cat => {
            const verticalName = cat.name.split('').join('<br>');
            cat.items.forEach((item, iIndex) => {
                const uniqueName = `radio_${fIndex}_${item.id}`;
                // 加入 oninput 監聽打字事件，觸發防呆鎖定
                htmlContent += `<tr>${iIndex === 0 ? `<td rowspan="${cat.items.length}" class="col-cat vertical-text">${verticalName}</td>` : ''}<td class="col-desc"><strong class="item-id-code">${item.id}</strong> ${item.desc}</td><td class="radio-cell"><label><input type="radio" class="pass-radio pass-radio-f${fIndex}" name="${uniqueName}" onchange="calcFailCount(${fIndex})"><span class="custom-radio"></span></label></td><td class="radio-cell"><label><input type="radio" class="fail-radio fail-radio-f${fIndex}" name="${uniqueName}" onchange="calcFailCount(${fIndex})"><span class="custom-radio"></span></label></td><td contenteditable="true" class="defect-desc-input" oninput="handleDefectInput(this, ${fIndex})"></td></tr>`;
            });
        });
        htmlContent += `</tbody></table></div><div style="background:#f9f9f9; padding:15px; border:1px solid #ddd; font-size:14px; margin-bottom:20px;">${form.notes}</div>
            <div class="signatures">
                <div class="sign-column"><div class="sign-row"><span class="sign-label">會同單位：</span><div class="sign-box" onclick="openSignaturePad(this)">電子簽章</div></div><div class="sign-row"><span class="sign-label">會同人員：</span><div class="sign-box" onclick="openSignaturePad(this)">電子簽章</div></div></div>
                <div class="sign-column"><div class="sign-row"><span class="sign-label">稽查單位：</span><div class="sign-box" onclick="openSignaturePad(this)">電子簽章</div></div><div class="sign-row"><span class="sign-label">稽查人員：</span><div class="sign-box" onclick="openSignaturePad(this)">電子簽章</div></div></div>
            </div></div>`;
    });
    document.getElementById('app').innerHTML = htmlContent;
    document.querySelectorAll('.date-year').forEach(el => el.value = _rocYear); document.querySelectorAll('.date-month').forEach(el => el.value = _month); document.querySelectorAll('.date-day').forEach(el => el.value = _day);

    const uploadedPhotosDB = {}; 
    window.generatePhotoReport = function() {
        const failRadios = document.querySelectorAll('.fail-radio:checked');
        const reportSection = document.getElementById('photo-report-section');
        const tbody = document.getElementById('photo-table-body');
        if (failRadios.length === 0) { alert('目前沒有勾選任何「不合格」項目，無須上傳照片！'); reportSection.style.display = 'none'; return; }
        let tableHTML = '';
        failRadios.forEach(radio => {
            const tr = radio.closest('tr'); const itemCode = tr.querySelector('.item-id-code').textContent.trim();
            let defectText = tr.querySelector('.defect-desc-input').textContent.trim(); if(!defectText) defectText = '<span style="color:#aaa;">(未填寫說明)</span>';
            let photoContent = uploadedPhotosDB[itemCode] ? `<img src="${uploadedPhotosDB[itemCode]}" class="uploaded-img-preview" alt="缺失照片"><label class="reupload-text">重新上傳<input type="file" accept="image/*" style="display:none;" onchange="handleImageFile(this, '${itemCode}')"></label>` : `<label class="upload-btn-ui">上傳照片<input type="file" accept="image/*" style="display:none;" onchange="handleImageFile(this, '${itemCode}')"></label>`;
            tableHTML += `<tr><td style="font-size: 18px; font-weight: bold;">${itemCode}</td><td style="text-align: left;">${defectText}</td><td id="photo-cell-${itemCode}">${photoContent}</td></tr>`;
        });
        tbody.innerHTML = tableHTML; reportSection.style.display = 'block'; reportSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
    };

    window.handleImageFile = function(inputElement, itemCode) {
        const file = inputElement.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                uploadedPhotosDB[itemCode] = e.target.result;
                document.getElementById(`photo-cell-${itemCode}`).innerHTML = `<img src="${e.target.result}" class="uploaded-img-preview" alt="缺失照片"><label class="reupload-text">重新上傳<input type="file" accept="image/*" style="display:none;" onchange="handleImageFile(this, '${itemCode}')"></label>`;
            }; reader.readAsDataURL(file);
        }
    };

    const modal = document.getElementById("sig-modal"); const canvas = document.getElementById("sig-canvas"); const ctx = canvas.getContext("2d"); const wrapper = document.getElementById("canvas-wrapper");
    let isDrawing = false; let currentSignBox = null; 
    function getCoordinates(event) { const rect = canvas.getBoundingClientRect(); let clientX = event.clientX; let clientY = event.clientY; if (event.touches && event.touches.length > 0) { clientX = event.touches[0].clientX; clientY = event.touches[0].clientY; } return { x: (clientX - rect.left) * (canvas.width / rect.width), y: (clientY - rect.top) * (canvas.height / rect.height) }; }
    function startDrawing(e) { e.preventDefault(); isDrawing = true; const coords = getCoordinates(e); ctx.beginPath(); ctx.moveTo(coords.x, coords.y); }
    function draw(e) { if (!isDrawing) return; e.preventDefault(); const coords = getCoordinates(e); ctx.lineTo(coords.x, coords.y); ctx.strokeStyle = "#000000"; ctx.lineWidth = 3; ctx.lineCap = "round"; ctx.lineJoin = "round"; ctx.stroke(); }
    function stopDrawing() { if(isDrawing) { ctx.closePath(); isDrawing = false; } }
    canvas.addEventListener("mousedown", startDrawing); canvas.addEventListener("mousemove", draw); canvas.addEventListener("mouseup", stopDrawing); canvas.addEventListener("mouseout", stopDrawing);
    canvas.addEventListener("touchstart", startDrawing, { passive: false }); canvas.addEventListener("touchmove", draw, { passive: false }); canvas.addEventListener("touchend", stopDrawing);
    window.openSignaturePad = function(element) { currentSignBox = element; modal.style.display = "flex"; canvas.width = wrapper.clientWidth; canvas.height = wrapper.clientHeight; clearCanvas(); };
    window.closeSignaturePad = function() { modal.style.display = "none"; currentSignBox = null; };
    window.clearCanvas = function() { ctx.clearRect(0, 0, canvas.width, canvas.height); };
    window.saveSignature = function() { if (currentSignBox) { currentSignBox.innerHTML = `<img src="${canvas.toDataURL("image/png")}" alt="電子簽名">`; currentSignBox.style.backgroundColor = "transparent"; currentSignBox.style.border = "none"; } closeSignaturePad(); };
    window.addEventListener('click', function(event) { if (event.target == modal) { closeSignaturePad(); } });
</script>
